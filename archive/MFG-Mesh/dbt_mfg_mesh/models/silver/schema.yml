version: 2

models:
  - name: telemetry_silver
    description: |
      SLA-enforced telemetry. Schema is locked with `enforced: true` so dbt
      rejects writes that would violate the declared contract (per Phase 3).
    config:
      contract:
        enforced: true
    columns:
      - name: facility_id
        data_type: varchar
        constraints:
          - type: not_null
      - name: line_id
        data_type: varchar
        constraints:
          - type: not_null
      - name: register_id
        data_type: varchar
        constraints:
          - type: not_null
      - name: plc_timestamp_ms
        data_type: bigint
        constraints:
          - type: not_null
      - name: anomaly_flag
        data_type: boolean
      - name: voltage
        data_type: double
        tests:
          - dbt_utils.accepted_range:
              min_value: 12.0
              max_value: 16.0
              inclusive: true
      - name: temperature_c
        data_type: double
      - name: pressure_bar
        data_type: double
