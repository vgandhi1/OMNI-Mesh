name: heal_mesh_telemetry
version: 0.1.0
config-version: 2

profile: heal_mesh_telemetry

model-paths: ["models"]
macro-paths: ["macros"]
seed-paths: ["seeds"]
test-paths: ["tests"]
snapshot-paths: ["snapshots"]
analysis-paths: ["analyses"]

target-path: target
clean-targets:
  - target
  - dbt_packages

# Mirrors the blueprint snippet:
#   models:
#     heal_mesh_telemetry:
#       +contract:
#         enforced: true
#       silver:
#         +materialized: iceberg
#         +schema: telemetry_silver
#
# In this local reference iceberg materialization is provided by the
# underlying DuckDB engine reading/writing parquet under the warehouse path.
# In production this becomes `+materialized: iceberg` against the REST catalog.
models:
  heal_mesh_telemetry:
    +materialized: table
    bronze:
      +schema: telemetry_bronze
    silver:
      +schema: telemetry_silver
      +contract:
        enforced: true
    gold:
      +schema: telemetry_gold
      +contract:
        enforced: true
