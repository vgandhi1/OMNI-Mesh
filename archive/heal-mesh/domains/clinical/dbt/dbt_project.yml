name: heal_mesh_clinical
version: 0.1.0
config-version: 2

profile: heal_mesh_clinical

model-paths: ["models"]
macro-paths: ["macros"]
seed-paths: ["seeds"]
test-paths: ["tests"]

target-path: target
clean-targets:
  - target
  - dbt_packages

# Phase 3 — the PHI salt is required for every silver/gold materialization.
# Sourced from environment via dbt's `env_var`. The bootstrap refuses to run
# with a placeholder value.
vars:
  phi_salt: "{{ env_var('HEAL_MESH_PHI_SALT', '') }}"

models:
  heal_mesh_clinical:
    +materialized: table
    bronze:
      +schema: clinical_bronze
    silver:
      +schema: clinical_silver
      +contract:
        enforced: true
    gold:
      +schema: clinical_gold
      +contract:
        enforced: true
