version: 2

models:
  - name: silver_ecrf_patients
    description: |
      Cleansed eCRF cohort with all PHI columns SHA-256+salt hashed via the
      ``phi_mask`` macro. Only consented patients are retained.
    config:
      contract:
        enforced: true
    columns:
      - name: patient_id
        data_type: varchar
        constraints: [{type: not_null}]
        tests: [unique, not_null]
      - name: mrn_hash
        data_type: varchar
        description: |
          Keyed-hash digest of the raw MRN. Production targets use
          ``HMAC_SHA256``; the local DuckDB target uses a salted
          double-SHA approximation. Never reversible to the real MRN.
      - name: first_name_hash
        data_type: varchar
      - name: last_name_hash
        data_type: varchar
      - name: email_hash
        data_type: varchar
      - name: birth_year
        data_type: date
      - name: age_bracket
        data_type: varchar
        description: |
          Coarse age cohort computed at silver time against the real DOB
          before generalization, so it is correct year-round. Values are
          one of ``<30``, ``30-45``, ``45-60``, ``60+``.
        tests:
          - accepted_values:
              values: ['<30', '30-45', '45-60', '60+']
      - name: sex_at_birth
        data_type: varchar
      - name: study_id
        data_type: varchar
        constraints: [{type: not_null}]
      - name: consent_signed
        data_type: boolean
      - name: region
        data_type: varchar
      - name: enrolled_ts
        data_type: timestamp
