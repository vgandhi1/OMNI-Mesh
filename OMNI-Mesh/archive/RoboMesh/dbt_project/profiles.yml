# dbt profile for RoboMesh.
# Uses DuckDB locally; in production swap for ``dbt-databricks`` /
# ``dbt-snowflake`` and point at the Polaris REST catalog.
robomesh:
  target: local
  outputs:
    local:
      type: duckdb
      path: ../data/artifacts/robomesh.duckdb
      threads: 4
      extensions:
        - parquet
