version: 2

# Sources point at the local Iceberg warehouse via DuckDB's parquet reader.
# In production these would be Iceberg external tables in
# ``polaris_mesh_catalog`` (see docs/RoboMesh.md Phase 1).
sources:
  - name: bronze_raw
    description: Raw Bronze parquet drops produced by `make generate`.
    meta:
      domain: data-mesh
    tables:
      - name: teleop_episode_metadata
        external:
          location: "read_parquet('../data/raw/teleop/episode_metadata.parquet')"
      - name: teleop_vr_trajectories
        external:
          location: "read_parquet('../data/raw/teleop/vr_trajectories.parquet')"
      - name: teleop_camera_manifest
        external:
          location: "read_parquet('../data/raw/teleop/camera_manifest.parquet')"
      - name: telemetry_joint_states
        external:
          location: "read_parquet('../data/raw/telemetry/joint_states.parquet')"
      - name: telemetry_network_health
        external:
          location: "read_parquet('../data/raw/telemetry/network_health.parquet')"
      - name: simulation_policy_rollouts
        external:
          location: "read_parquet('../data/raw/simulation/policy_rollouts.parquet')"
      - name: simulation_sim_to_real
        external:
          location: "read_parquet('../data/raw/simulation/sim_to_real.parquet')"
