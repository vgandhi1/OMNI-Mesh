version: 2

models:
  - name: gold_vla_episodes
    description: |
      VLA-ready, per-episode feature store. Partitioned in production on
      ``robot_model_id`` and ``failure_type_tag``.
    config:
      contract:
        enforced: true
    columns:
      - name: episode_id
        data_type: varchar
        constraints:
          - type: not_null
          - type: primary_key
      - name: robot_model_id
        data_type: varchar
      - name: failure_type_tag
        data_type: varchar
      - name: success_flag
        data_type: boolean
      - name: peak_torque_nm
        data_type: double
      - name: mean_policy_confidence
        data_type: double
      - name: trajectory_l2_error_m
        data_type: double
