version: 2

models:
  - name: facility_health
    description: Aggregated per-facility health and anomaly metrics.
    columns:
      - name: facility_id
        constraints:
          - type: not_null
      - name: sample_count
      - name: avg_voltage
      - name: avg_temperature_c
      - name: avg_pressure_bar
      - name: anomaly_count
      - name: latest_sample_ms
