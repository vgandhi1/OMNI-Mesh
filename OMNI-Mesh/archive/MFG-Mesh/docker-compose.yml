version: "3.9"

# Optional infrastructure for running MFG-Mesh in full streaming mode.
# The default end-to-end demo (`scripts/run_demo.py`) does NOT require this stack;
# it writes directly to the local Iceberg catalog. Bring this up only when you
# want to exercise the Kafka edge ingestion path.

services:
  redpanda:
    image: redpandadata/redpanda:v24.1.7
    container_name: mfg-mesh-redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://localhost:9092
    ports:
      - "9092:9092"
      - "9644:9644"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info"]
      interval: 10s
      timeout: 5s
      retries: 6

  minio:
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    container_name: mfg-mesh-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - mfg_mesh_minio:/data

volumes:
  mfg_mesh_minio:
