version: 2

models:
  - name: gold_patient_health_index
    description: >
      Public data product surfaced by the Telemetry Domain. Consumed by the
      Commercial Domain (churn correlation) and the AI Readiness tier (semantic
      serialization). Schema is contractually stable - downstream consumers
      depend on the column list and types below.
    access: public
    config:
      contract:
        enforced: true
    columns:
      - name: patient_id
        data_type: varchar
        constraints: [{type: not_null}]
        tests: [not_null]
      - name: week_start
        data_type: timestamp
        constraints: [{type: not_null}]
      - name: avg_hr_bpm
        data_type: double
      - name: avg_hrv_ms
        data_type: double
      - name: avg_spo2
        data_type: double
      - name: total_deep_sleep_min
        data_type: double
      - name: total_steps
        data_type: hugeint
      - name: hrv_delta_vs_prev_week
        data_type: double
      - name: hr_delta_vs_prev_week
        data_type: double
      - name: sleep_risk_tier
        data_type: varchar
        tests:
          - accepted_values:
              values: [low, moderate, elevated]
      - name: sleep_efficiency_score
        data_type: varchar
        tests:
          - accepted_values:
              values: [poor, fair, good]
