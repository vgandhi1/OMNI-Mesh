version: 2

models:
  - name: gold_patient_cohort
    description: >
      Public data product - de-identified patient cohort metadata. Joins with
      the telemetry and commercial gold tables via the opaque ``patient_id``
      key. Carries **no** raw PHI by contract.
    access: public
    config:
      contract:
        enforced: true
    columns:
      - name: patient_id
        data_type: varchar
        constraints: [{type: not_null}]
        tests: [unique, not_null]
      - name: age_bracket
        data_type: varchar
        tests:
          - accepted_values:
              values: ['<30', '30-45', '45-60', '60+']
      - name: sex_at_birth
        data_type: varchar
      - name: region
        data_type: varchar
      - name: study_id
        data_type: varchar
      - name: enrolled_ts
        data_type: timestamp
